name: 最新版构建 (Nightly)

on:
  schedule:
    - cron: "42 * * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "强制构建（跳过版本检查）"
        required: false
        default: "false"
        type: boolean

env:
  UPSTREAM_REPO: openclaw/openclaw
  NODE_VERSION: "22"

permissions:
  contents: write
  packages: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
      upstream_sha: ${{ steps.check.outputs.sha }}
      nightly_version: ${{ steps.check.outputs.nightly_version }}

    steps:
      - name: 检测上游变更
        id: check
        run: |
          UPSTREAM_VERSION=$(curl -s https://registry.npmjs.org/openclaw/latest | jq -r '.version')
          UPSTREAM_SHA=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/commits/main | jq -r '.sha' | cut -c1-7)

          LAST_SHA=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/nightly \
            | jq -r '.body // ""' | grep -oP '<!-- upstream_sha:\K[a-f0-9]+' || echo "")

          if [ "$UPSTREAM_SHA" != "$LAST_SHA" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

          TIMESTAMP=$(date +%Y%m%d%H%M)
          NIGHTLY_VERSION="${UPSTREAM_VERSION}-nightly.${TIMESTAMP}"

          echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          echo "sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "nightly_version=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'

    uses: ./.github/workflows/build-core.yml

    with:
      version_type: nightly
      version: ${{ needs.check-upstream.outputs.nightly_version }}
      upstream_version: ${{ needs.check-upstream.outputs.upstream_version }}
      upstream_sha: ${{ needs.check-upstream.outputs.upstream_sha }}

    secrets: inherit

  publish:
    needs: [check-upstream, build]
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: openclaw-build-nightly
          path: openclaw

      - name: 验证功能面板注入
        run: |
          JS_FILE=""

          if [ -f openclaw/dist/canvas-host/a2ui/a2ui.bundle.js ]; then
            JS_FILE="openclaw/dist/canvas-host/a2ui/a2ui.bundle.js"
          elif ls openclaw/dist/control-ui/assets/index-*.js 1>/dev/null 2>&1; then
            JS_FILE=$(ls openclaw/dist/control-ui/assets/index-*.js | head -1)
          fi

          if [ -n "$JS_FILE" ]; then
            PANEL_COUNT=$(grep -c 'initPanel' "$JS_FILE" || echo 0)

            if [ "$PANEL_COUNT" -eq "0" ]; then
              echo "⚠️ 警告: artifact 中未检测到功能面板代码！"
            fi
          fi

      - name: 创建发布包
        run: |
          mkdir -p release

          cp -r openclaw/dist release/
          cp openclaw/package.json release/
          cp openclaw/README.md release/ 2>/dev/null || true

          cat > release/version.txt << EOF
          OpenClaw 汉化版 - Nightly 构建
          构建时间: ${{ needs.build.outputs.build_date }} ${{ needs.build.outputs.build_time }}
          上游版本: ${{ needs.check-upstream.outputs.upstream_version }}
          上游 SHA: ${{ needs.check-upstream.outputs.upstream_sha }}
          Nightly 版本: ${{ needs.check-upstream.outputs.nightly_version }}

          汉化统计:
          - 应用规则: ${{ needs.build.outputs.applied }} 条
          - 已存在规则: ${{ needs.build.outputs.existed }} 条
          - 未匹配规则: ${{ needs.build.outputs.failed }} 条
          EOF

          cd release
          find . -type f -not -name "checksums.txt" -exec sha256sum {} \; > checksums.txt
          cd ..

      - name: 创建压缩包
        run: |
          tar -czf "openclaw-zh-nightly-${{ needs.check-upstream.outputs.nightly_version }}.tar.gz" -C release .

          cd release
          zip -r "../openclaw-zh-nightly-${{ needs.check-upstream.outputs.nightly_version }}.zip" .
          cd ..

          tar -czf "openclaw-zh-nightly-${{ needs.check-upstream.outputs.nightly_version }}-minimal.tar.gz" -C release/dist .

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: 发布到 npm
        working-directory: openclaw
        run: npm publish --access public --tag nightly --ignore-scripts || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 同步 npmmirror
        run: |
          curl -sX PUT \
          "https://registry-direct.npmmirror.com/-/package/@qingchencloud/openclaw-zh/syncs" || true

      - name: 删除旧 nightly 标签
        run: git push origin :refs/tags/nightly || true

      - name: 创建新的 nightly 标签
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -fa nightly -m "Nightly build ${{ needs.build.outputs.build_date }} ${{ needs.build.outputs.build_time }}"
          git push origin nightly --force

      - name: 创建/更新 Nightly Release
        uses: softprops/action-gh-release@v1

        with:
          tag_name: nightly
          name: "🌙 Nightly Build - ${{ needs.build.outputs.build_date }} ${{ needs.build.outputs.build_time }}"
          prerelease: true

          files: |
            openclaw-zh-nightly-${{ needs.check-upstream.outputs.nightly_version }}.tar.gz
            openclaw-zh-nightly-${{ needs.check-upstream.outputs.nightly_version }}.zip
            openclaw-zh-nightly-${{ needs.check-upstream.outputs.nightly_version }}-minimal.tar.gz

          body: |
            <!-- upstream_sha:${{ needs.check-upstream.outputs.upstream_sha }} -->

            ## 🌙 OpenClaw 汉化版 - Nightly Build

            **构建时间**: ${{ needs.build.outputs.build_date }} ${{ needs.build.outputs.build_time }}
            **上游版本**: ${{ needs.check-upstream.outputs.upstream_version }}
            **上游 SHA**: `${{ needs.check-upstream.outputs.upstream_sha }}`
            **Nightly 版本**: `${{ needs.check-upstream.outputs.nightly_version }}`

            ### 📊 汉化统计
            - ✅ 应用规则: **${{ needs.build.outputs.applied }}**
            - ⏭️ 已存在: ${{ needs.build.outputs.existed }}
            - ⚠️ 未匹配: ${{ needs.build.outputs.failed }}

            ### 📦 安装
            ```bash
            npm install -g @qingchencloud/openclaw-zh@nightly
            docker pull ghcr.io/${{ github.repository_owner }}/openclaw-zh:nightly
            docker pull ${{ github.repository_owner }}/openclaw-zh:nightly
            ```

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  skip-summary:
    needs: check-upstream
    if: needs.check-upstream.outputs.has_changes == 'false' && github.event.inputs.force_build != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 无变更跳过
        run: echo "⏭️ 上游无变更，跳过构建"
